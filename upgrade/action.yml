name: "upgrade"
description: "[ALPHA] Upgrades Fern CLI and generator versions and opens or updates a shared upgrade PR"
author: "Fern"

inputs:
  version:
    description: "Fern CLI version to use. 'auto' respects fern.config.json and falls back to latest, 'latest' always uses the newest release, 'inherit' uses the bootstrapped binary as-is, or pin to a specific version (e.g. '0.15.0')."
    required: false
    default: "latest"
  fern-token:
    description: "Fern token for API access and CLI authentication"
    required: true
  include-major:
    description: "Whether to include major version upgrades for generators. Both the CLI and GHA default to true — the automations upgrade command is designed to aggressively upgrade, letting the preview action validate breaking changes. Set to 'false' for minor/patch only."
    required: false
    default: "true"
  github-token:
    description: "GitHub token for PR creation and push access. Falls back to default GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}

outputs:
  run-id:
    description: "UUIDv4 for this upgrade run"
  pr-url:
    description: "URL of the created or updated upgrade PR (empty if no changes)"
  cli-upgraded:
    description: "Whether the Fern CLI version was upgraded"
  generators-upgraded:
    description: "JSON array of {generator, from, to} for each upgraded generator"

runs:
  using: "node20"
  main: "dist/index.js"
  post: "dist/index.js"
