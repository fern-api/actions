# yaml-language-server: $schema=https://schema.buildwithfern.dev/generators-yml.json
api:
  specs:
    - openapi: ./openapi.yml
groups:
  python-sdk:
    generators:
      - name: fernapi/fern-python-sdk
        version: 4.38.1
        output:
          location: pypi
          package-name: demo
          # uncomment to publish to registry
          token: ${PYPI_TOKEN}
        github:
          repository: fern-demo/autopilot-python-sdk-niels2
          mode: pull-request
        smart-casing: false
  go-sdk:
    generators:
      - name: fernapi/fern-go-sdk
        version: 1.18.0
        github:
          repository: fern-demo/autopilot-sdk-go-niels2
          mode: pull-request
        config:
          clientName: TestClient
  java-sdk:
    audiences:
      - public
    generators:
      - name: fernapi/fern-java-sdk
        version: 3.36.2
        output:
          location: maven
          coordinate: com.example:autorelease-demo-sdk
          username: ${MAVEN_USERNAME}
          password: ${MAVEN_PASSWORD}
          signature:
            keyId: ${MAVEN_SIGNATURE_SECRET_KEY_ID}
            password: ${MAVEN_SIGNATURE_PASSWORD}
            secretKey: ${MAVEN_SIGNATURE_SECRET_KEY}
        config:
          publish-to: central
        github:
          repository: fern-demo/autorelease-demo-java-sdk-niels2
          mode: pull-request
        smart-casing: false
  internal-sdk:
    audiences:
      - internal-sdk
    generators:
      - name: fernapi/fern-typescript-node-sdk
        autorelease: false
        version: 0.9.5
        output:
          location: local-file-system
          path: ../../packages/nodejs/sdk/dist/lib
        config:
          noSerdeLayer: true
        smart-casing: false
      - name: fernapi/fern-go-sdk
        version: 0.22.3
        config:
          importPath: github.com/fern-demo/autorelease-demo/packages/go/sdk
          packageName: sdk
        output:
          location: local-file-system
          path: ../../packages/go/sdk
        smart-casing: false
  public:
    audiences:
      - public
    generators:
      - name: fernapi/fern-openapi
        version: 0.0.31
        config:
          format: yaml
        output:
          location: local-file-system
          path: ../../openapi/public
        smart-casing: false
  everything:
    generators:
      - name: fernapi/fern-openapi
        version: 0.0.31
        config:
          format: yaml
        output:
          location: local-file-system
          path: ../../openapi/everything
        smart-casing: false
