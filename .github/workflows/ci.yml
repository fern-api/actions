name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint GitHub Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          matcher: true

  ci:
    name: Test, Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@fern-github-actions/shared" build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint & Format check
        run: pnpm check

      - name: Test
        run: pnpm test

  build:
    name: Build & Verify Bundles
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package first
        run: pnpm --filter "@fern-github-actions/shared" build

      - name: Build all actions
        run: pnpm build

      - name: Verify bundles exist
        run: |
          # Bundles aren't tracked on main anymore — they're produced by the
          # preceding `pnpm build` step. This step just confirms the build
          # actually emitted a dist/index.js for every Node.js action.
          for action_dir in example-action generate preview resolve-cli setup-cli sync-openapi upgrade verify verify-token; do
            if [ ! -f "${action_dir}/package.json" ]; then
              echo "SKIP: ${action_dir} has no package.json"
              continue
            fi
            bundle="${action_dir}/dist/index.js"
            if [ ! -f "$bundle" ]; then
              echo "ERROR: Missing bundle at $bundle"
              exit 1
            fi
            echo "OK: $bundle exists ($(du -sh "$bundle" | cut -f1))"
          done
