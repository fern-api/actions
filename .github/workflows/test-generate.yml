name: Test generate

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Only discover generators without running them"
        type: boolean
        default: true
      group:
        description: "Filter to a specific generator group (optional)"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-generate:
    name: "generate (dry-run: ${{ inputs.dry-run != false }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run generate action
        id: generate
        uses: ./actions/generate
        with:
          fern-token: ${{ secrets.FERN_TOKEN }}
          dry-run: ${{ inputs.dry-run != false }}
          group: ${{ inputs.group }}

      - name: Assert commands discovered
        shell: bash
        env:
          COMMANDS: ${{ steps.generate.outputs.commands }}
        run: |
          echo "Commands: $COMMANDS"
          COUNT=$(echo "$COMMANDS" | jq 'length')
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::Expected at least one command, got 0"
            exit 1
          fi
          echo "Discovered $COUNT generator command(s)"
