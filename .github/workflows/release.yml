name: Release
#
# Triggered when a release is published in this monorepo.
# Tag format: <action-name>@<version>  e.g. sync-openapi@v4.1.0
#
# All actions are referenced directly from fern-api/actions — no mirroring.
# This workflow moves major/minor alias tags on this repo so consumers pinned
# to e.g. fern-api/actions/sync-openapi@v4 get the update automatically.
#
# example-action is blocked from releasing (template only).
#
# TODO: pin internal sibling-action refs at release time.
# Composite actions in this repo (e.g. generate/action.yml) currently use
# `uses: fern-api/actions/<sibling>@main` for sibling actions. This is fine for
# day-to-day development but means a customer pinned to generate@v1 still
# resolves verify-token from main — drift risk.
# Fix at release time, not by mutating tags (immutable tags are the future):
#   1. Cut releases on a branch (e.g. release/<action>@v1.2.3).
#   2. Sed-rewrite sibling refs in <action>/action.yml from @main to @v1.2.3.
#   3. Commit the rewrite on that branch.
#   4. Tag v1.2.3 from that commit (created once, never moved).
#   5. Move floating aliases (v1, v1.2) to the same commit — what this workflow
#      already does for non-internally-referencing actions.
# Result: customers on @v1.2.3 get a fully self-consistent composition;
# customers on @v1 get auto-bumps via the floating alias.

on:
  release:
    types: [published]

jobs:
  # ---------------------------------------------------------------------------
  # Parse the release tag.
  # ---------------------------------------------------------------------------
  parse:
    name: Parse release tag
    runs-on: ubuntu-latest
    outputs:
      action-name: ${{ steps.tag.outputs.action-name }}
      version:     ${{ steps.tag.outputs.version }}
      skip:        ${{ steps.tag.outputs.skip }}
    steps:
      - name: Parse tag
        id: tag
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Expected format: <action-name>@<version>  e.g. sync-openapi@v4.1.0
          if [[ "$TAG" != *"@"* ]]; then
            echo "ERROR: Tag '$TAG' does not match expected format <action-name>@<version>"
            exit 1
          fi

          ACTION_NAME="${TAG%%@*}"
          VERSION="${TAG##*@}"

          echo "action-name=$ACTION_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"

          if [[ "$ACTION_NAME" == "example-action" ]]; then
            echo "Skipping release for example-action (template only)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Move major/minor alias tags on this repo.
  # ---------------------------------------------------------------------------
  tag-alias:
    name: Move alias tags for ${{ needs.parse.outputs.action-name }} ${{ needs.parse.outputs.version }}
    runs-on: ubuntu-latest
    needs: parse
    if: needs.parse.outputs.skip != 'true'
    permissions:
      contents: write
    env:
      ACTION_NAME: ${{ needs.parse.outputs.action-name }}
      VERSION:     ${{ needs.parse.outputs.version }}
    steps:
      - name: Checkout monorepo at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Move alias tags
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          STRIPPED="${VERSION#v}"
          # Strip pre-release suffix (e.g. 4.1.0-beta.1 -> 4.1.0) for part counting
          CORE="${STRIPPED%%-*}"
          MAJOR="v$(echo "$CORE" | cut -d. -f1)"
          PARTS=$(echo "$CORE" | tr '.' '\n' | wc -l)

          # Alias tags are only moved for stable releases, not pre-releases
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            # Major alias e.g. sync-openapi@v4
            git tag -f "${ACTION_NAME}@${MAJOR}"
            git push origin "refs/tags/${ACTION_NAME}@${MAJOR}" --force

            # Minor alias e.g. sync-openapi@v4.1 — only for semver with 3+ parts
            if [ "$PARTS" -ge 3 ]; then
              MINOR="v$(echo "$CORE" | cut -d. -f1).$(echo "$CORE" | cut -d. -f2)"
              git tag -f "${ACTION_NAME}@${MINOR}"
              git push origin "refs/tags/${ACTION_NAME}@${MINOR}" --force
            fi
          fi
