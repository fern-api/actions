name: Fern Generate (reusable)

on:
  workflow_call:
    inputs:
      group:
        description: "Filter to a specific generator group (optional)"
        type: string
      api:
        description: "Filter to a specific API (optional)"
        type: string
      version:
        description: "Version strategy for generated packages"
        type: string
        default: "AUTO"
      auto-merge:
        description: "Enable automerge on non-breaking PRs"
        type: boolean
        default: true
      dry-run:
        description: "Only discover generators without running them"
        type: boolean
        default: false
    secrets:
      fern-token:
        description: "FERN_TOKEN for authentication"
        required: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      commands: ${{ steps.generate.outputs.commands }}
    steps:
      - uses: actions/checkout@v4
      - id: generate
        uses: fern-api/actions/actions/generate@main
        with:
          fern-token: ${{ secrets.fern-token }}
          dry-run: true
          group: ${{ inputs.group }}
          api: ${{ inputs.api }}
          version: ${{ inputs.version }}
          auto-merge: ${{ inputs.auto-merge }}

  generate:
    needs: discover
    if: ${{ inputs.dry-run != true }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command: ${{ fromJson(needs.discover.outputs.commands) }}
    steps:
      - uses: actions/checkout@v4
      - uses: fern-api/actions/actions/verify-token@main
        with:
          fern-token: ${{ secrets.fern-token }}
      - uses: fern-api/actions/actions/resolve-cli@main
        id: cli
        with:
          version: auto
      - name: Run generator
        shell: bash
        env:
          FERN_TOKEN: ${{ secrets.fern-token }}
          COMMAND: ${{ matrix.command }}
          FERN_RUN_ID: ${{ github.run_id }}-${{ strategy.job-index }}
        run: |
          # Strip leading "fern " — we already invoke fern via fern-cmd
          CMD=$(echo "$COMMAND" | sed 's/^fern //')
          echo "Running: $CMD"
          eval "${{ steps.cli.outputs.fern-cmd }} $CMD"
