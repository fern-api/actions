name: "Fern Generate"
description: "Run fern automations generate to create SDK PRs for every (or a filtered subset of) generator."
author: "Fern"

inputs:
  fern-token:
    description: "FERN_TOKEN for authentication"
    required: true
  auto-merge:
    description: "Enable automerge on non-breaking PRs"
    required: false
    default: "true"
  group:
    description: "Filter to a specific generator group"
    required: false
  api:
    description: "Filter to a specific API in a multi-API repo (e.g. 'foo' for fern/apis/foo/)"
    required: false
  generator:
    description: "Filter to a specific generator by 0-based index or name (e.g. '0' or 'fernapi/fern-python-sdk')"
    required: false
  version:
    description: "Version strategy for generated packages"
    required: false
    default: "AUTO"

runs:
  using: "node20"
  main: "dist/index.js"
  post: "dist/index.js"

branding:
  icon: "package"
  color: "green"
