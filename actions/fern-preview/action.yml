name: "Fern SDK Preview"
description: "Auto-detect TypeScript SDK groups, publish preview packages, and post PR comments with install links and SDK diff links"
author: "Fern"
inputs:
  fern-token:
    description: "Fern authentication token (FERN_TOKEN)"
    required: true
  fern-version:
    description: "Fern CLI version to install (e.g. 'latest', '3.98.5')"
    required: false
    default: "latest"
  github-token:
    description: "GitHub token for posting PR comments. Defaults to the built-in GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  push-diff:
    description: "Push a preview diff branch to the SDK repo for comparison. Requires github config in generators.yml."
    required: false
    default: "true"
outputs:
  results:
    description: "JSON array of preview results (status, groupName, packageName, installCommand, version)"
runs:
  using: "node20"
  main: "dist/index.js"
branding:
  icon: "package"
  color: "green"
