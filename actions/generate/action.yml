name: "Fern Generate"
description: "Run fern generate to create SDK PRs — discovers generators via the CLI and runs each one."
author: "Fern"

inputs:
  fern-token:
    description: "FERN_TOKEN for authentication"
    required: true
  auto-merge:
    description: "Enable automerge on non-breaking PRs"
    required: false
    default: "true"
  group:
    description: "Filter to a specific generator group"
    required: false
  version:
    description: "Version strategy for generated packages"
    required: false
    default: "AUTO"
  dry-run:
    description: "When true, only discover generators and output the commands without running them"
    required: false
    default: "false"

outputs:
  commands:
    description: "JSON array of fern automations generate commands (one per generator). Use with fromJson() for matrix fan-out."
    value: ${{ steps.list.outputs.commands }}

runs:
  using: composite
  steps:
    - name: Resolve Fern CLI
      id: cli
      uses: fern-api/actions/resolve-cli@main
      with:
        version: latest

    - name: Discover generators
      id: list
      shell: bash
      env:
        FERN_TOKEN: ${{ inputs.fern-token }}
        GROUP: ${{ inputs.group }}
        VERSION: ${{ inputs.version }}
        AUTO_MERGE: ${{ inputs.auto-merge }}
      run: |
        ARGS=()
        [ -n "$GROUP" ] && ARGS+=(--group "$GROUP")
        [ -n "$VERSION" ] && ARGS+=(--version "$VERSION")
        [ "$AUTO_MERGE" = "true" ] && ARGS+=(--auto-merge)

        COMMANDS=$(${{ steps.cli.outputs.fern-cmd }} automations list generate "${ARGS[@]}")
        echo "commands=$COMMANDS" >> "$GITHUB_OUTPUT"
        echo "Discovered commands: $COMMANDS"

    - name: Run generators
      if: inputs.dry-run != 'true'
      shell: bash
      env:
        FERN_TOKEN: ${{ inputs.fern-token }}
        COMMANDS: ${{ steps.list.outputs.commands }}
      run: |
        TOTAL=$(echo "$COMMANDS" | jq 'length')
        echo "Running $TOTAL generator command(s)..."

        FAILED=0
        for i in $(seq 0 $(( TOTAL - 1 ))); do
          CMD=$(echo "$COMMANDS" | jq -r ".[$i]")
          echo "::group::Generator $i"
          echo "Running: $CMD"

          export FERN_RUN_ID="${{ github.run_id }}-${i}"
          if eval "${{ steps.cli.outputs.fern-cmd }} $CMD"; then
            echo "Generator $i succeeded"
          else
            echo "::error::Generator $i failed"
            FAILED=$((FAILED + 1))
          fi
          echo "::endgroup::"
        done

        if [ "$FAILED" -gt 0 ]; then
          echo "::error::$FAILED generator(s) failed"
          exit 1
        fi

branding:
  icon: "package"
  color: "green"
