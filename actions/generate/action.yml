name: "generate"
description: "[ALPHA] Runs fern generate on push to main and opens SDK PRs in SDK repos"
author: "Fern"

inputs:
  version:
    description: "Fern CLI version to use. 'auto' respects fern.config.json and falls back to latest, 'latest' always uses the newest release, 'inherit' uses the bootstrapped binary as-is, or pin to a specific version (e.g. '0.15.0')."
    required: false
    default: "auto"
  fern-token:
    description: "Fern token for API access and SDK repo PR creation"
    required: true
  auto-merge:
    description: "Automatically enable GitHub automerge on opened SDK PRs (disabled if breaking changes detected)"
    required: false
    default: "true"
  reviewers:
    description: "GitHub teams or users to tag on failure issues (newline-separated)"
    required: false

outputs:
  run-id:
    description: "UUIDv4 for this generation run"
  prs-created:
    description: "JSON array of {generator, repo, pr_url} for each SDK PR opened"
  generators-failed:
    description: "JSON array of {generator, error} for each failed generator"

runs:
  using: "node20"
  main: "dist/index.js"
